<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clauddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #161616; --border: #2a2a2a;
      --text: #e8e8e8; --muted: #555; --accent: #5b6af0;
      --accent-light: rgba(91,106,240,.12); --orb-glow: rgba(91,106,240,.3);
      --radius: 16px;
    }
    body {
      font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text);
      height: 100dvh; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .blob { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; opacity: .4; }
    .blob-1 { width: 400px; height: 400px; background: #1a1d5e; top: -120px; left: -100px; }
    .blob-2 { width: 350px; height: 350px; background: #12154a; bottom: -80px; right: -60px; }

    header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 20px 28px; display: flex; justify-content: space-between; align-items: center;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 34px; height: 34px; border-radius: 10px; background: var(--accent);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      box-shadow: 0 4px 12px var(--orb-glow);
    }
    .logo h1 { font-size: 18px; font-weight: 800; letter-spacing: -.01em; }
    #clock {
      font-size: 13px; font-weight: 600; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      padding: 5px 12px; border-radius: 20px;
    }

    .orb-wrap { position: relative; width: 200px; height: 200px; margin-bottom: 40px; }
    .ring { position: absolute; border-radius: 50%; border: 2px solid transparent; }
    .ring-1 { inset: -16px; border-top-color: rgba(91,106,240,.25); border-right-color: rgba(91,106,240,.25); animation: spin 6s linear infinite; }
    .ring-2 { inset: -30px; border-bottom-color: rgba(91,106,240,.15); border-left-color: rgba(91,106,240,.15); animation: spin 10s linear infinite reverse; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .orb {
      position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #8b97f8, #5b6af0 55%, #3d4de0);
      box-shadow: 0 0 0 8px rgba(91,106,240,.1), 0 8px 32px rgba(91,106,240,.35), 0 20px 60px rgba(91,106,240,.15);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: transform .2s, box-shadow .2s; font-size: 52px; user-select: none;
    }
    .orb:hover { transform: scale(1.04); }
    .orb-wrap.recording .orb { animation: pulse-listen .8s ease-in-out infinite; }
    .orb-wrap.speaking  .orb { animation: pulse-speak  .5s ease-in-out infinite; }
    @keyframes pulse-listen {
      0%,100% { transform: scale(1);    box-shadow: 0 0 0 8px rgba(91,106,240,.1), 0 8px 32px rgba(91,106,240,.35); }
      50%      { transform: scale(1.06); box-shadow: 0 0 0 16px rgba(91,106,240,.2), 0 12px 50px rgba(91,106,240,.55); }
    }
    @keyframes pulse-speak { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

    .wave { position: absolute; bottom: -24px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; align-items: flex-end; }
    .wave span { display: block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; opacity: .3; }
    .orb-wrap.recording .wave span,
    .orb-wrap.speaking  .wave span { opacity: 1; animation: bounce .6s ease-in-out infinite; }
    .wave span:nth-child(1) { animation-delay: 0s; }
    .wave span:nth-child(2) { animation-delay: .12s; }
    .wave span:nth-child(3) { animation-delay: .24s; }
    .wave span:nth-child(4) { animation-delay: .12s; }
    .wave span:nth-child(5) { animation-delay: 0s; }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

    #status {
      font-size: 13px; font-weight: 600; letter-spacing: .03em;
      color: var(--accent); background: var(--accent-light);
      border: 1.5px solid rgba(91,106,240,.15);
      padding: 5px 16px; border-radius: 20px; margin-bottom: 20px;
      min-height: 32px; display: flex; align-items: center;
    }

    #transcript-box {
      width: min(520px, 92vw); max-height: 200px; overflow-y: auto;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 24px;
      scrollbar-width: none;
    }
    #transcript-box::-webkit-scrollbar { display: none; }
    #log { display: flex; flex-direction: column; gap: 10px; }
    .log-entry { display: flex; flex-direction: column; gap: 3px; }
    .log-entry .label  { font-size: 10px; font-weight: 700; letter-spacing: .08em; color: var(--muted); }
    .log-entry .you    { font-size: 14px; font-weight: 600; color: var(--accent); }
    .log-entry .clauddy { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.6; }

    .controls { display: flex; gap: 14px; align-items: center; }
    .btn-main {
      width: 58px; height: 58px; border-radius: 50%; border: none;
      background: var(--accent); color: #fff; font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px var(--orb-glow); transition: transform .15s;
    }
    .btn-main:hover  { transform: scale(1.07); }
    .btn-main.active { background: #e05555; box-shadow: 0 6px 20px rgba(224,85,85,.4); }
    .btn-small {
      width: 42px; height: 42px; border-radius: 50%;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--muted); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, color .15s, transform .15s;
    }
    .btn-small:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.05); }
    .hint { position: fixed; bottom: 22px; font-size: 12px; font-weight: 600; color: var(--muted); }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<header>
  <div class="logo">
    <div class="logo-icon">☀️</div>
    <h1>Clauddy</h1>
  </div>
  <span id="clock">--:--:--</span>
</header>

<div class="orb-wrap" id="orb">
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="orb" id="orb-btn" title="Tap to speak">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </div>
  <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
</div>

<div id="status">Tap to start</div>

<div id="transcript-box"><div id="log"></div></div>

<div class="controls">
  <button class="btn-small" id="btn-mute" title="Mute voice">🔊</button>
  <button class="btn-main"  id="btn-mic"  title="Tap to speak">🎙️</button>
  <button class="btn-small" id="btn-clear" title="Clear chat">🗑️</button>
</div>

<p class="hint" id="hint">Say «Hey Clauddy» or tap the orb to talk</p>

<script>
  // ── API Key ───────────────────────────────────────────────────────────────
  let GROQ_KEY = localStorage.getItem("groq_api_key");
  if (!GROQ_KEY) {
    GROQ_KEY = prompt("Enter your Groq API key (free at console.groq.com):");
    if (GROQ_KEY) localStorage.setItem("groq_api_key", GROQ_KEY.trim());
    GROQ_KEY = GROQ_KEY?.trim() || "";
  }
  const GROQ_CHAT_URL  = "https://api.groq.com/openai/v1/chat/completions";
  const GROQ_STT_URL   = "https://api.groq.com/openai/v1/audio/transcriptions";
  const MODEL          = "llama-3.3-70b-versatile";
  const SYSTEM_PROMPT  = `You are Clauddy, a highly intelligent personal AI assistant. You are witty, dry, and subtly sarcastic — but always helpful and loyal. Keep responses concise (1-4 sentences) since this is a voice interface. No bullet points or markdown. Speak naturally as if talking out loud.`;

  // ElevenLabs TTS
  let EL_KEY = localStorage.getItem("el_api_key") || "";
  if (!EL_KEY) {
    EL_KEY = (prompt("Enter your ElevenLabs API key (free at elevenlabs.io):") || "").trim();
    if (EL_KEY) localStorage.setItem("el_api_key", EL_KEY);
  }
  const EL_VOICE_ID = "onwK4e9ZLuTAKqWW03F9"; // Daniel — British male, natural
  const EL_URL      = `https://api.elevenlabs.io/v1/text-to-speech/${EL_VOICE_ID}`;

  // ── State ─────────────────────────────────────────────────────────────────
  // 'idle' | 'wake' | 'recording' | 'transcribing' | 'thinking' | 'speaking'
  let appState       = 'idle';
  let inConversation = false;
  let idleTimer      = null;
  let history        = [{ role: "system", content: SYSTEM_PROMPT }];
  let muted          = false;

  // Recording
  let mediaRecorder  = null;
  let audioChunks    = [];
  let micStream      = null;
  let audioCtx       = null;
  let rafId          = null;

  // ── Wake word (desktop Chrome only) ──────────────────────────────────────
  const SR      = window.SpeechRecognition || window.webkitSpeechRecognition;
  const hasWake = !!SR;
  let wakeRecog = null;

  function startWake() {
    if (!hasWake || appState !== 'idle') return;
    appState = 'wake';
    setStatus("Say «Hey Clauddy»...");
    if (wakeRecog) { try { wakeRecog.abort(); } catch(e) {} }
    wakeRecog = new SR();
    wakeRecog.lang = "en-US";
    wakeRecog.continuous = true;
    wakeRecog.interimResults = true;
    wakeRecog.onresult = (e) => {
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript.toLowerCase();
        if (t.includes("hey clauddy") || t.includes("hey clady") ||
            t.includes("hey cloudy")  || t.includes("hey claudie") ||
            t.includes("hey claude")  || t.includes("hey cloddy")) {
          wakeRecog.onresult = wakeRecog.onend = wakeRecog.onerror = null;
          try { wakeRecog.abort(); } catch(e2) {}
          appState = 'idle';
          enterConversation();
          setTimeout(startRecording, 250);
          return;
        }
      }
    };
    wakeRecog.onend = () => { if (appState === 'wake') startWake(); };
    wakeRecog.onerror = (e) => {
      if (e.error === 'not-allowed') { setStatus("Mic access denied"); return; }
      if (appState === 'wake') setTimeout(startWake, 1000);
    };
    try { wakeRecog.start(); } catch(e) { setTimeout(startWake, 1000); }
  }

  function stopWake() {
    if (wakeRecog) {
      wakeRecog.onresult = wakeRecog.onend = wakeRecog.onerror = null;
      try { wakeRecog.abort(); } catch(e) {}
      wakeRecog = null;
    }
    if (appState === 'wake') appState = 'idle';
  }

  // ── DOM ───────────────────────────────────────────────────────────────────
  const orbWrap  = document.getElementById("orb");
  const orbBtn   = document.getElementById("orb-btn");
  const btnMic   = document.getElementById("btn-mic");
  const btnMute  = document.getElementById("btn-mute");
  const btnClear = document.getElementById("btn-clear");
  const statusEl = document.getElementById("status");
  const log      = document.getElementById("log");

  setInterval(() => {
    document.getElementById("clock").textContent =
      new Date().toLocaleTimeString("en-US", { hour12: true });
  }, 1000);

  function setStatus(t) { statusEl.textContent = t; }

  // ── Conversation mode ─────────────────────────────────────────────────────
  function enterConversation() {
    inConversation = true;
    resetIdleTimer();
  }
  function resetIdleTimer() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      inConversation = false;
      if (appState === 'idle') setStatus("Tap to start");
    }, 30000);
  }
  function afterSpeak() {
    orbWrap.classList.remove("speaking");
    appState = 'idle';
    if (inConversation) {
      resetIdleTimer();
      setTimeout(startRecording, 400);
    } else if (hasWake) {
      startWake();
    } else {
      setStatus("Tap to start");
    }
  }

  // ── Recording ─────────────────────────────────────────────────────────────
  async function startRecording() {
    if (appState !== 'idle') return;

    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch(e) {
      setStatus("Mic access denied");
      return;
    }

    appState     = 'recording';
    audioChunks  = [];
    enterConversation();

    // Silence detection via AudioContext analyser
    audioCtx        = new AudioContext();
    const analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    audioCtx.createMediaStreamSource(micStream).connect(analyser);
    const freqData  = new Uint8Array(analyser.frequencyBinCount);
    let   silenceMs = 0;
    let   lastTick  = performance.now();

    function checkSilence() {
      if (appState !== 'recording') return;
      analyser.getByteFrequencyData(freqData);
      const avg = freqData.reduce((a, b) => a + b, 0) / freqData.length;
      const now = performance.now();
      const dt  = now - lastTick;
      lastTick  = now;

      if (avg < 12) {
        silenceMs += dt;
        if (silenceMs >= 1800) { stopRecording(); return; }
      } else {
        silenceMs = 0;
      }
      rafId = requestAnimationFrame(checkSilence);
    }
    rafId = requestAnimationFrame(checkSilence);

    // Pick a supported MIME type
    const mime = ['audio/webm', 'audio/mp4', 'audio/ogg'].find(m => MediaRecorder.isTypeSupported(m)) || '';
    mediaRecorder = new MediaRecorder(micStream, mime ? { mimeType: mime } : {});
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = transcribe;
    mediaRecorder.start(250); // collect data every 250ms so we don't miss audio

    orbWrap.classList.add("recording");
    btnMic.classList.add("active");
    setStatus("Listening...");
  }

  function stopRecording() {
    if (appState !== 'recording') return;
    cancelAnimationFrame(rafId);
    appState = 'transcribing';
    orbWrap.classList.remove("recording");
    btnMic.classList.remove("active");
    setStatus("Transcribing...");
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    micStream?.getTracks().forEach(t => t.stop());
    audioCtx?.close();
  }

  // Manual stop/start toggle
  function toggleMic() {
    if (appState === 'recording')                      { stopRecording(); inConversation = false; return; }
    if (appState === 'transcribing' || appState === 'thinking') return;
    if (appState === 'speaking')                       { stopSpeaking(); }
    stopWake();
    enterConversation();
    startRecording();
  }

  // ── Whisper transcription ─────────────────────────────────────────────────
  async function transcribe() {
    const mimeType = mediaRecorder?.mimeType || 'audio/webm';
    const ext      = mimeType.includes('mp4') ? 'm4a' : mimeType.includes('ogg') ? 'ogg' : 'webm';
    const blob     = new Blob(audioChunks, { type: mimeType });

    // Skip if recording is too short/empty (< 5KB is basically silence)
    if (!audioChunks.length || blob.size < 5000) {
      appState = 'idle';
      if (inConversation) setTimeout(startRecording, 400); else if (hasWake) startWake(); else setStatus("Tap to start");
      return;
    }

    const form = new FormData();
    form.append('file', blob, `audio.${ext}`);
    form.append('model', 'whisper-large-v3');
    form.append('language', 'en');
    form.append('response_format', 'json');

    try {
      const res  = await fetch(GROQ_STT_URL, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${GROQ_KEY}` },
        body: form
      });
      const data = await res.json();
      const text = data.text?.trim();
      if (!text) { appState = 'idle'; if (inConversation) setTimeout(startRecording, 400); else setStatus("Tap to start"); return; }
      appendLog("YOU", text);
      respond(text);
    } catch(e) {
      setStatus("Transcription failed — tap to retry");
      appState = 'idle';
    }
  }

  // ── Groq chat ─────────────────────────────────────────────────────────────
  async function respond(userText) {
    appState = 'thinking';
    setStatus("Thinking...");
    history.push({ role: "user", content: userText });
    try {
      const res  = await fetch(GROQ_CHAT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
        body: JSON.stringify({ model: MODEL, messages: history, stream: false })
      });
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content ?? "I lost my train of thought — tap to try again.";
      history.push({ role: "assistant", content: reply });
      appendLog("CLAUDDY", reply);
      speak(reply);
    } catch {
      speak("I can't reach my brain right now. Check your connection?");
    }
  }

  // ── ElevenLabs TTS ────────────────────────────────────────────────────────
  let currentAudio = null;

  async function speak(text) {
    appState = 'speaking';
    if (muted) { afterSpeak(); return; }
    setStatus("Speaking...");
    orbWrap.classList.add("speaking");

    const clean = text.replace(/[*_`#]/g, "");

    try {
      const res = await fetch(EL_URL, {
        method: 'POST',
        headers: {
          'xi-api-key': EL_KEY,
          'Content-Type': 'application/json',
          'Accept': 'audio/mpeg'
        },
        body: JSON.stringify({
          text: clean,
          model_id: 'eleven_turbo_v2_5',
          voice_settings: { stability: 0.45, similarity_boost: 0.80, style: 0.35, use_speaker_boost: true }
        })
      });

      if (!res.ok) throw new Error("ElevenLabs error " + res.status);

      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      currentAudio = new Audio(url);
      currentAudio.onended = () => { URL.revokeObjectURL(url); currentAudio = null; afterSpeak(); };
      currentAudio.onerror = () => { URL.revokeObjectURL(url); currentAudio = null; afterSpeak(); };
      await currentAudio.play();
    } catch(e) {
      // Fallback to speechSynthesis if ElevenLabs fails
      console.warn("ElevenLabs failed, falling back:", e);
      const utter = new SpeechSynthesisUtterance(clean);
      utter.onend = utter.onerror = afterSpeak;
      setTimeout(afterSpeak, Math.max(5000, clean.split(" ").length * 500));
      speechSynthesis.speak(utter);
    }
  }

  function stopSpeaking() {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    else speechSynthesis.cancel();
    orbWrap.classList.remove("speaking");
    appState = 'idle';
  }

  // ── Log ───────────────────────────────────────────────────────────────────
  function appendLog(who, text) {
    const entry = document.createElement("div");
    entry.className = "log-entry";
    entry.innerHTML = `<span class="label">${who}</span><span class="${who === "YOU" ? "you" : "clauddy"}">${text}</span>`;
    log.appendChild(entry);
    document.getElementById("transcript-box").scrollTop = 99999;
  }

  // ── Controls ──────────────────────────────────────────────────────────────
  orbBtn.addEventListener("click", toggleMic);
  btnMic.addEventListener("click", toggleMic);
  btnMute.addEventListener("click", () => {
    muted = !muted;
    btnMute.textContent = muted ? "🔇" : "🔊";
    if (muted && speechSynthesis.speaking) speechSynthesis.cancel();
  });
  btnClear.addEventListener("click", () => {
    log.innerHTML = "";
    history = [{ role: "system", content: SYSTEM_PROMPT }];
    inConversation = false;
    clearTimeout(idleTimer);
    if (hasWake) startWake(); else setStatus("Tap to start");
  });
  document.addEventListener("keydown", e => {
    if (e.code === "Space" && e.target === document.body) { e.preventDefault(); toggleMic(); }
  });

  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  speechSynthesis.getVoices();

  // Boot into wake mode (desktop) or idle (iOS)
  setTimeout(() => { if (hasWake) startWake(); else setStatus("Tap to start"); }, 500);
</script>
</body>
</html>
