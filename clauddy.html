<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clauddy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --border: #e4e4e0;
      --text: #18181a;
      --muted: #888884;
      --user-bg: #18181a;
      --user-text: #f7f7f5;
      --ai-bg: #ffffff;
      --accent: #2563eb;
      --radius: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      font-size: 15px;
    }

    /* Header */
    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -.01em;
    }
    .model-badge {
      font-size: 12px;
      color: var(--muted);
      background: var(--border);
      padding: 3px 10px;
      border-radius: 20px;
      cursor: pointer;
      user-select: none;
      transition: background .15s;
    }
    .model-badge:hover { background: #ddd; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }

    .msg-row {
      display: flex;
      padding: 0 24px;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.ai   { justify-content: flex-start; }

    .bubble {
      max-width: min(72%, 560px);
      padding: 11px 16px;
      border-radius: var(--radius);
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-row.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }
    .msg-row.ai .bubble {
      background: var(--ai-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Cursor blink */
    .cursor::after {
      content: "▋";
      animation: blink .6s step-end infinite;
      color: var(--muted);
      font-size: .85em;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Code blocks inside messages */
    .bubble code {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 13px;
      background: #f0f0ec;
      padding: 1px 5px;
      border-radius: 4px;
    }
    .bubble pre {
      background: #1a1a1c;
      color: #e8e8e2;
      border-radius: 10px;
      padding: 14px 16px;
      margin: 8px 0;
      overflow-x: auto;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 13px;
      line-height: 1.6;
    }
    .bubble pre code { background: none; padding: 0; color: inherit; font-size: inherit; }

    /* Empty state */
    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      pointer-events: none;
      padding-bottom: 80px;
    }
    #empty svg { opacity: .3; }
    #empty p { font-size: 14px; }

    /* Suggestions */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
      pointer-events: all;
    }
    .suggestion {
      font-size: 13px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }
    .suggestion:hover {
      border-color: #bbb;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }

    /* Input area */
    #input-area {
      border-top: 1px solid var(--border);
      background: var(--bg);
      padding: 16px 24px 20px;
      flex-shrink: 0;
    }
    #form {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color .15s, box-shadow .15s;
    }
    #form:focus-within {
      border-color: #aaa;
      box-shadow: 0 0 0 3px rgba(0,0,0,.05);
    }
    #input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      resize: none;
      line-height: 1.5;
      max-height: 180px;
      min-height: 24px;
    }
    #input::placeholder { color: var(--muted); }
    #send {
      width: 32px;
      height: 32px;
      background: var(--text);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, opacity .15s;
    }
    #send:disabled { opacity: .35; cursor: not-allowed; }
    #send:not(:disabled):hover { background: #333; }
    #send svg { display: block; }

    /* Error toast */
    #toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #dc2626;
      color: #fff;
      padding: 9px 18px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Model picker dialog */
    #model-dialog {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s;
    }
    #model-dialog.open { opacity: 1; pointer-events: all; }
    .dialog-box {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      width: 320px;
      box-shadow: 0 8px 40px rgba(0,0,0,.18);
    }
    .dialog-box h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
    .dialog-box input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      margin-bottom: 12px;
    }
    .dialog-box input:focus { border-color: #aaa; }
    .dialog-buttons { display: flex; gap: 8px; justify-content: flex-end; }
    .dialog-buttons button {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .dialog-buttons .primary { background: var(--text); color: #fff; border-color: var(--text); }
  </style>
</head>
<body>

<header>
  <h1>Clauddy</h1>
  <span class="model-badge" id="model-label" title="Click to change model">llava</span>
</header>

<div id="messages">
  <div id="empty">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <p>Start a conversation</p>
    <div class="suggestions">
      <button class="suggestion" data-msg="Explain recursion with a simple example">Explain recursion</button>
      <button class="suggestion" data-msg="Write a Python function to find all prime numbers up to N">Prime numbers in Python</button>
      <button class="suggestion" data-msg="What's the difference between TCP and UDP?">TCP vs UDP</button>
      <button class="suggestion" data-msg="Give me a quick overview of Big O notation">Big O notation</button>
    </div>
  </div>
</div>

<div id="input-area">
  <form id="form">
    <textarea id="input" placeholder="Message…" rows="1" autofocus></textarea>
    <button id="send" type="submit" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </form>
</div>

<div id="toast"></div>

<!-- Model picker -->
<div id="model-dialog">
  <div class="dialog-box">
    <h2>Change model</h2>
    <input id="model-input" type="text" placeholder="e.g. llama-3.3-70b-versatile, mixtral-8x7b-32768" />
    <div class="dialog-buttons">
      <button id="dialog-cancel">Cancel</button>
      <button id="dialog-ok" class="primary">Apply</button>
    </div>
  </div>
</div>

<script>
  let GROQ_KEY = localStorage.getItem("groq_api_key");
  if (!GROQ_KEY) {
    GROQ_KEY = prompt("Enter your Groq API key (get one free at console.groq.com):");
    if (GROQ_KEY) localStorage.setItem("groq_api_key", GROQ_KEY.trim());
    GROQ_KEY = GROQ_KEY?.trim() || "";
  }
  const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
  let model = "llama-3.3-70b-versatile";
  const SYSTEM = { role: "system", content: "Your name is Clauddy. You are a helpful AI assistant." };
  let history = []; // { role, content }
  let streaming = false;

  const messagesEl = document.getElementById("messages");
  const emptyEl    = document.getElementById("empty");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("send");
  const form       = document.getElementById("form");
  const toast      = document.getElementById("toast");
  const modelLabel = document.getElementById("model-label");

  // ── Auto-resize textarea ──
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = inputEl.scrollHeight + "px";
    sendBtn.disabled = !inputEl.value.trim() || streaming;
  });

  // ── Send on Enter (Shift+Enter = newline) ──
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submit(); }
  });
  form.addEventListener("submit", e => { e.preventDefault(); submit(); });

  // ── Suggestion chips ──
  document.querySelectorAll(".suggestion").forEach(btn => {
    btn.addEventListener("click", () => {
      inputEl.value = btn.dataset.msg;
      inputEl.dispatchEvent(new Event("input"));
      submit();
    });
  });

  // ── Model picker ──
  const dialog = document.getElementById("model-dialog");
  const modelInput = document.getElementById("model-input");
  modelLabel.addEventListener("click", () => {
    modelInput.value = model;
    dialog.classList.add("open");
    modelInput.focus();
    modelInput.select();
  });
  document.getElementById("dialog-cancel").addEventListener("click", () => dialog.classList.remove("open"));
  document.getElementById("dialog-ok").addEventListener("click", applyModel);
  modelInput.addEventListener("keydown", e => { if (e.key === "Enter") applyModel(); });
  dialog.addEventListener("click", e => { if (e.target === dialog) dialog.classList.remove("open"); });
  function applyModel() {
    const val = modelInput.value.trim();
    if (val) { model = val; modelLabel.textContent = val; }
    dialog.classList.remove("open");
  }

  // ── Submit ──
  async function submit() {
    const text = inputEl.value.trim();
    if (!text || streaming) return;

    emptyEl.style.display = "none";
    addBubble("user", text);
    history.push({ role: "user", content: text });

    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;
    streaming = true;

    const aiBubble = addBubble("ai", "");
    aiBubble.classList.add("cursor");

    try {
      const res = await fetch(GROQ_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${GROQ_KEY}`
        },
        body: JSON.stringify({
          model,
          messages: [SYSTEM, ...history],
          stream: true
        })
      });

      if (!res.ok) throw new Error(`Groq error: ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let full = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const lines = decoder.decode(value, { stream: true }).split("\n").filter(Boolean);
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const json = line.slice(6);
          if (json === "[DONE]") break;
          try {
            const data = JSON.parse(json);
            const delta = data?.choices?.[0]?.delta?.content ?? "";
            full += delta;
            renderBubble(aiBubble, full);
            scrollBottom();
          } catch {}
        }
      }

      history.push({ role: "assistant", content: full });

    } catch (err) {
      aiBubble.textContent = "";
      history.pop();
      showToast(err.message);
    } finally {
      aiBubble.classList.remove("cursor");
      streaming = false;
      sendBtn.disabled = !inputEl.value.trim();
      scrollBottom();
    }
  }

  // ── Helpers ──
  function addBubble(role, text) {
    const row = document.createElement("div");
    row.className = `msg-row ${role}`;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    renderBubble(bubble, text);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return bubble;
  }

  function renderBubble(el, text) {
    // Minimal markdown: code blocks, inline code
    let html = escapeHtml(text)
      .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${code.trimEnd()}</code></pre>`)
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.+?)\*/g, "<em>$1</em>");
    el.innerHTML = html;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove("show"), 4000);
  }
</script>
</body>
</html>
